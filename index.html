<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FitTracker AI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
  :root{--g:#00ff88;--b:#00c8ff;--r:#ff4466;--bg:#08080f;--card:#111120;--border:#1e1e2e;--text:#f0f0f8;--muted:#555}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}

  /* BG ANIMATION */
  .bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none}
  .glow1{position:absolute;width:400px;height:400px;border-radius:99px;background:radial-gradient(circle,#00ff8815,transparent 70%);top:-100px;left:-100px;animation:float1 8s ease-in-out infinite}
  .glow2{position:absolute;width:300px;height:300px;border-radius:99px;background:radial-gradient(circle,#00c8ff10,transparent 70%);bottom:-80px;right:-80px;animation:float2 10s ease-in-out infinite}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,40px)}}
  @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-30px)}}

  .wrap{position:relative;z-index:1;width:100%;max-width:380px}

  /* LOGO */
  .logo-wrap{text-align:center;margin-bottom:32px}
  .logo-icon{font-size:56px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 20px #00ff8860)}
  .logo-text{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;background:linear-gradient(90deg,var(--g),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo-sub{font-size:13px;color:var(--muted);margin-top:4px}

  /* CARD */
  .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:28px 24px}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--g);letter-spacing:1px;margin-bottom:4px}
  .card-sub{font-size:13px;color:var(--muted);margin-bottom:24px}

  /* FORM */
  .form-group{margin-bottom:16px}
  .label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
  .inp{background:#1a1a2a;border:1px solid #2a2a3e;border-radius:12px;color:var(--text);padding:13px 15px;font-size:15px;font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:border-color .2s}
  .inp:focus{border-color:var(--g)}
  .inp-icon{position:relative}
  .inp-icon .inp{padding-left:44px}
  .inp-icon .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
  .show-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px}

  /* BUTTON */
  .btn-login{background:linear-gradient(135deg,var(--g),#00cc66);color:#000;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;padding:14px;width:100%;cursor:pointer;transition:opacity .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-login:active{opacity:.8}
  .btn-login:disabled{opacity:.6;cursor:not-allowed}

  /* ERROR */
  .error-msg{background:#ff446615;border:1px solid #ff446640;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--r);margin-top:12px;display:none}
  .error-msg.show{display:block}

  /* SUCCESS */
  .success-msg{background:#00ff8815;border:1px solid #00ff8840;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--g);margin-top:12px;display:none}
  .success-msg.show{display:block}

  /* FOOTER */
  .footer{text-align:center;margin-top:20px;font-size:11px;color:var(--muted)}
  .footer span{color:var(--g)}

  /* LOADING */
  .sp{width:18px;height:18px;border:2px solid #00000040;border-top-color:#000;border-radius:99px;animation:spin .7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .wrap{animation:fadeIn .4s ease}
</style>
</head>
<body>

<div class="bg-glow"><div class="glow1"></div><div class="glow2"></div></div>

<div class="wrap">
  <!-- LOGO -->
  <div class="logo-wrap">
    <span class="logo-icon">💪</span>
    <div class="logo-text">FitTracker AI</div>
    <div class="logo-sub">Personal Fitness Dashboard — Asrid</div>
  </div>

  <!-- LOGIN CARD -->
  <div class="card">
    <div class="card-title">Welcome Back 👋</div>
    <div class="card-sub">Sign in to access your fitness data from anywhere</div>

    <div class="form-group">
      <label class="label">Email</label>
      <div class="inp-icon">
        <span class="icon">📧</span>
        <input class="inp" type="email" id="email" placeholder="your@email.com" autocomplete="email" autocapitalize="none">
      </div>
    </div>

    <div class="form-group">
      <label class="label">Password</label>
      <div class="inp-icon" style="position:relative">
        <span class="icon">🔒</span>
        <input class="inp" type="password" id="password" placeholder="Enter your password" autocomplete="current-password" id="pw">
        <button class="show-pw" onclick="togglePw()" id="eyeBtn">👁️</button>
      </div>
    </div>

    <button class="btn-login" onclick="login()" id="loginBtn">
      <span id="loginBtnText">Sign In</span>
    </button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
  </div>

  <div class="footer">
    🔒 Your data is <span>private & encrypted</span><br>
    Powered by Supabase Auth + Claude AI
  </div>
</div>

<script>
// Init Supabase
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Check if already logged in
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    window.location.href = 'app.html';
  }
}
checkSession();

function togglePw() {
  const pw = document.getElementById('password');
  const btn = document.getElementById('eyeBtn');
  if (pw.type === 'password') {
    pw.type = 'text';
    btn.textContent = '🙈';
  } else {
    pw.type = 'password';
    btn.textContent = '👁️';
  }
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const btnText = document.getElementById('loginBtnText');
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');

  // Validate
  if (!email || !password) {
    showError('Please enter both email and password');
    return;
  }

  // Loading state
  btn.disabled = true;
  btnText.innerHTML = '<span class="sp"></span> Signing in...';
  errorMsg.classList.remove('show');
  successMsg.classList.remove('show');

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      showError(error.message === 'Invalid login credentials'
        ? '❌ Wrong email or password. Please try again.'
        : '❌ ' + error.message);
      btn.disabled = false;
      btnText.textContent = 'Sign In';
      return;
    }

    // Success
    successMsg.textContent = '✅ Login successful! Loading your dashboard...';
    successMsg.classList.add('show');
    setTimeout(() => { window.location.href = 'app.html'; }, 800);

  } catch (e) {
    showError('❌ Connection error. Check your internet and try again.');
    btn.disabled = false;
    btnText.textContent = 'Sign In';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

// Enter key to login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
